<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Center</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff; /* White text */
        }
        table, th, td {
            border: 1px solid #fff; /* White borders */
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        input[type="text"], select, input[type="number"] {
            padding: 5px;
            margin: 5px;
            width: 150px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button {
            padding: 10px;
            background-color: #333; /* Dark grey button background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
        #totalAmount {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Data Center</h1>

    <h3>Add Transaction</h3>
    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="lastInitial" placeholder="Last Initial">
    <select id="transactionType">
        <option value="Buyer">Buyer</option>
        <option value="Seller">Seller</option>
    </select>
    <input type="number" id="amountPaid" placeholder="Amount Paid">
    <button onclick="addTransaction()">Add Transaction</button>

    <h3>Transactions</h3>
    <table id="transactionTable">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Initial</th>
                <th>Buyer/Seller</th>
                <th>Amount Paid</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be dynamically added here -->
        </tbody>
    </table>

    <h3>Total Amount: $<span id="totalAmount">0</span></h3>

    <script>
        let totalAmount = 0;
        let transactions = [];

        // Load transactions from local storage when the page loads
        window.onload = function() {
            const storedTransactions = localStorage.getItem('transactions');
            if (storedTransactions) {
                transactions = JSON.parse(storedTransactions);
                transactions.forEach(transaction => {
                    addTransactionToTable(transaction);
                    totalAmount += transaction.amountPaid;
                });
                document.getElementById('totalAmount').innerText = totalAmount.toFixed(2);
            }
        };

        // Add a new transaction
        function addTransaction() {
            const firstName = document.getElementById('firstName').value;
            const lastInitial = document.getElementById('lastInitial').value;
            const transactionType = document.getElementById('transactionType').value;
            const amountPaid = parseFloat(document.getElementById('amountPaid').value);

            // Validate inputs
            if (!firstName || !lastInitial || isNaN(amountPaid) || amountPaid <= 0) {
                alert('Please fill in all fields correctly.');
                return;
            }

            // Create transaction object
            const transaction = {
                firstName,
                lastInitial,
                transactionType,
                amountPaid
            };

            // Add transaction to the table and update total amount
            addTransactionToTable(transaction);
            totalAmount += amountPaid;
            document.getElementById('totalAmount').innerText = totalAmount.toFixed(2);

            // Store transaction in the local array and local storage
            transactions.push(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));

            // Clear inputs after adding transaction
            document.getElementById('firstName').value = '';
            document.getElementById('lastInitial').value = '';
            document.getElementById('amountPaid').value = '';
        }

        // Add a transaction row to the table
        function addTransactionToTable(transaction) {
            const table = document.getElementById('transactionTable').getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();

            newRow.insertCell(0).innerText = transaction.firstName;
            newRow.insertCell(1).innerText = transaction.lastInitial;
            newRow.insertCell(2).innerText = transaction.transactionType;
            newRow.insertCell(3).innerText = `$${transaction.amountPaid.toFixed(2)}`;
        }
    </script>

</body>
</html>
