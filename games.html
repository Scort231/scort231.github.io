<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Games</title>
  <link rel="icon" href="favicon-16x16.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      padding: 50px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* Space out items vertically */
    }

    h1 {
      font-size: 2rem;
      animation: pulse 2s infinite;
      letter-spacing: 4px;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
    }

    .glow {
      width: 85%;
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 0;
      margin: 0 auto 20px auto;
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes flicker {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="glow">
    <h1>Games</h1>
  </div>

  <!-- Additional content for games can be added here -->

</body>
</html>
