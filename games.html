<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Games - Scott's Website</title>
  <link rel="icon" href="favicon-16x16.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Center items vertically */
      height: 100vh;
      text-align: center; /* Center text */
    }

    h1 {
      font-size: 2rem;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 columns for grid */
      gap: 10px;
      justify-items: center; /* Center grid items */
    }

    .button {
      width: 100px;
      height: 100px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.6);
      border-radius: 10px;
      color: transparent; /* Hide text since buttons are blank */
      cursor: pointer;
      transition: background 0.2s;
    }

    .button:hover {
      background: rgba(0, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <h1>Games</h1>
  <div class="grid">
    <!-- Each button links to a different game page -->
    <a href="game1.html" class="button"></a>
    <a href="game2.html" class="button"></a>
    <a href="game3.html" class="button"></a>
    <a href="game4.html" class="button"></a>
    <a href="game5.html" class="button"></a>
    <a href="game6.html" class="button"></a>
    <a href="game7.html" class="button"></a>
    <a href="game8.html" class="button"></a>
    <a href="game9.html" class="button"></a>
  </div>
</body>
</html>
