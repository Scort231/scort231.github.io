<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center vertically */
            align-items: center; /* Center horizontally */
            height: 100vh; /* Full viewport height */
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
        }
        .chat-container {
            width: 80%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            padding: 10px;
            resize: none; /* Prevent resizing */
        }
        input[type="text"] {
            width: calc(100% - 100px);
            padding: 10px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button {
            padding: 10px 20px;
            background-color: #333; /* Dark grey button background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin: 10px; /* Spacing between buttons */
            cursor: pointer;
            width: 100px; /* Set a fixed width for the buttons */
        }
        button:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
    </style>
</head>
<body>

    <h1>Chat Room</h1>
    
    <div class="chat-container">
        <textarea id="chatBox" readonly></textarea><br>
        <input type="text" id="messageInput" placeholder="Type your message here">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div>
        <button onclick="goToHome()">Home</button>
        <button onclick="goToGames()">Games</button>
        <button onclick="goToDataCenter()">Data Center</button>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        // Check if the user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = "index.html"; // Redirect to login page if not logged in
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const chatBox = document.getElementById('chatBox');
            
            if (messageInput.value.trim()) {
                chatBox.value += `You: ${messageInput.value}\n`;
                messageInput.value = '';
            }
        }

        function goToHome() {
            window.location.href = "home.html"; // Redirect to the home page
        }

        function goToGames() {
            window.location.href = "games.html"; // Redirect to the games page
        }

        function goToDataCenter() {
            window.location.href = "data_center.html"; // Redirect to the data center page
        }

        function logout() {
            localStorage.removeItem('isLoggedIn'); // Clear login status
            window.location.href = "index.html"; // Redirect to login page
        }
    </script>

</body>
</html>
