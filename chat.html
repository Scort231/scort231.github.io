<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 80%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        .chat-box {
            height: 300px;
            background-color: #333;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px;
            overflow-y: scroll;
            margin-bottom: 10px;
        }
        .input-container {
            display: flex;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background-color: #444;
            color: #fff;
            border: 1px solid #fff;
        }
        button {
            padding: 10px;
            background-color: #333;
            color: #fff;
            border: 1px solid #fff;
            margin-left: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
        .user {
            font-weight: bold;
        }
        .dm-button {
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>

    <h1>Chat Room</h1>
    <div class="chat-container">
        <div id="chatBox" class="chat-box" readonly></div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type your message here">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div>
            <button class="dm-button" onclick="toggleDM('User1')">DM User1</button>
            <button class="dm-button" onclick="toggleDM('User2')">DM User2</button>
            <button onclick="goToHome()">Home</button>
        </div>
    </div>

    <script>
        const signalingServerUrl = 'ws://localhost:8080'; // Adjust if deployed
        const signalingSocket = new WebSocket(signalingServerUrl);

        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');

        signalingSocket.onmessage = (message) => {
            chatBox.value += message.data + '\n';
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll to the bottom
        };

        function sendMessage() {
            const message = messageInput.value;
            if (message) {
                const username = 'YourUsername'; // Replace this with the actual username
                const formattedMessage = `${username}: ${message}`;
                signalingSocket.send(formattedMessage);
                messageInput.value = '';
            }
        }

        function toggleDM(user) {
            const message = prompt(`Send a DM to ${user}:`);
            if (message) {
                const username = 'YourUsername'; // Replace this with the actual username
                const formattedMessage = `${username} (DM to ${user}): ${message}`;
                signalingSocket.send(formattedMessage);
            }
        }

        function goToHome() {
            window.location.href = 'home.html'; // Redirect to the home page
        }
    </script>

</body>
</html>
