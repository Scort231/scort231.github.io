<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
        }
        .chat-container {
            width: 80%; /* Width of the chat container */
            max-width: 800px; /* Max width of the chat container */
            display: flex;
            flex-direction: column; /* Arrange children vertically */
            align-items: stretch; /* Stretch children to fill container */
        }
        .chat-box {
            height: 300px; /* Fixed height for chat box */
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            padding: 10px; /* Inner padding */
            overflow-y: scroll; /* Scrollable if content overflows */
            margin-bottom: 10px; /* Space below chat box */
            white-space: pre-wrap; /* Maintain whitespace formatting */
        }
        .input-container {
            display: flex; /* Flexbox for input and button */
        }
        input[type="text"] {
            flex: 1; /* Take remaining space */
            padding: 10px; /* Inner padding */
            background-color: #444; /* Darker grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button {
            padding: 10px; /* Inner padding */
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            margin-left: 5px; /* Space between input and button */
            cursor: pointer; /* Pointer cursor on hover */
        }
        button:hover {
            background-color: #555; /* Lighter grey on hover */
        }
        .user {
            font-weight: bold; /* Bold for usernames */
        }
    </style>
</head>
<body>

    <h1>Group Chat Room</h1>
    <div class="chat-container">
        <div id="chatBox" class="chat-box"></div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type your message here">
            <button onclick="sendMessage()">Send</button>
        </div>
        <button onclick="goToHome()">Home</button> <!-- Home button below the input -->
    </div>

    <script>
        const signalingServerUrl = 'ws://localhost:8080'; // WebSocket server URL
        const signalingSocket = new WebSocket(signalingServerUrl); // Create WebSocket connection

        const chatBox = document.getElementById('chatBox'); // Chat box element
        const messageInput = document.getElementById('messageInput'); // Message input element

        // When a message is received from the server
        signalingSocket.onmessage = (message) => {
            chatBox.innerHTML += message.data + '<br>'; // Append incoming messages to chat box with line breaks
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll to the bottom of the chat
        };

        function sendMessage() {
            const message = messageInput.value.trim(); // Get message input
            if (message) {
                const username = 'YourUsername'; // Replace this with the actual username
                const formattedMessage = `<span class="user">${username}:</span> ${message}`; // Format message with username
                signalingSocket.send(formattedMessage); // Send message to server
                messageInput.value = ''; // Clear input field
            }
        }

        function goToHome() {
            window.location.href = 'home.html'; // Redirect to the home page
        }
    </script>

</body>
</html>
