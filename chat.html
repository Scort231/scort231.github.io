<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer-to-Peer Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            padding: 10px;
        }
        input[type="text"] {
            width: calc(100% - 120px);
            padding: 10px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button {
            padding: 10px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin-left: 10px;
        }
        button:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
    </style>
</head>
<body>

    <h1>Peer-to-Peer Chat</h1>
    <textarea id="chatBox" readonly></textarea><br>
    <input type="text" id="messageInput" placeholder="Type your message here">
    <button onclick="sendMessage()">Send</button>

    <div style="margin-top: 20px;">
        <button onclick="createConnection()">Create Connection</button>
        <button onclick="joinConnection()">Join Connection</button>
    </div>

    <script>
        let peerConnection;
        let dataChannel;

        // ICE servers - STUN servers help to find the public IP address for the P2P connection
        const configuration = {
            iceServers: [{
                urls: 'stun:stun.l.google.com:19302'
            }]
        };

        // Create a new peer connection
        function createConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            dataChannel = peerConnection.createDataChannel('chat');
            dataChannel.onmessage = receiveMessage;

            peerConnection.onicecandidate = ({candidate}) => {
                if (candidate) {
                    console.log(JSON.stringify(candidate));
                }
            };

            peerConnection.createOffer().then(offer => {
                return peerConnection.setLocalDescription(offer);
            }).then(() => {
                console.log(JSON.stringify(peerConnection.localDescription));
            });
        }

        // Join an existing connection
        function joinConnection() {
            const answer = prompt('Paste offer here');
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                dataChannel.onmessage = receiveMessage;
            };

            peerConnection.onicecandidate = ({candidate}) => {
                if (candidate) {
                    console.log(JSON.stringify(candidate));
                }
            };

            peerConnection.setRemoteDescription(JSON.parse(answer)).then(() => {
                return peerConnection.createAnswer();
            }).then(answer => {
                return peerConnection.setLocalDescription(answer);
            }).then(() => {
                console.log(JSON.stringify(peerConnection.localDescription));
            });
        }

        // Receive a message from the peer
        function receiveMessage(event) {
            const chatBox = document.getElementById('chatBox');
            chatBox.value += 'Peer: ' + event.data + '\n';
        }

        // Send a message to the peer
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            if (messageInput.value.trim() && dataChannel) {
                dataChannel.send(messageInput.value);
                const chatBox = document.getElementById('chatBox');
                chatBox.value += 'You: ' + messageInput.value + '\n';
                messageInput.value = '';
            }
        }
    </script>

</body>
</html>
