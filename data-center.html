<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Data Center</title>
  <link rel="icon" href="https://www.clipartmax.com/middle/m2i8H7m2Z5K9K9i8_planet-earth-of-the-solar-system-solar-system/favicon.png" type="image/x-icon">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Center content vertically */
    }

    h1 {
      font-size: 2rem;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
      margin-bottom: 20px;
    }

    .text-box {
      width: 70%;
      text-align: center;
      font-size: 1rem;
      color: white;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px #0ff;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Data Center</h1>
  <div class="text-box">
    Welcome to the Data Center!
  </div>
</body>
</html>
