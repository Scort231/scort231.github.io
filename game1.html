<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Game 1 - Scott's Website</title>
  <link rel="icon" href="favicon-16x16.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Center items vertically */
      height: 100vh;
      text-align: center; /* Center text */
    }

    h1 {
      font-size: 2rem;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
      margin-bottom: 20px;
    }

    .button {
      padding: 10px 20px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.6);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px #0ff;
    }

    .button:hover {
      background: rgba(0, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <h1>Game 1</h1>
  <div class="button" onclick="alert('Game 1 is not yet implemented!')">Start Game</div>
</body>
</html>
