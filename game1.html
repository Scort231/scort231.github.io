<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Game 1</title>
  <link rel="icon" href="favicon-16x16.png" type="image/x-icon">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      padding: 50px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
      margin-bottom: 20px;
    }

    .glow {
      width: 85%;
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 0;
      margin: 0 auto 20px auto;
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3);
    }

    iframe {
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="glow">
    <h1>Game 1</h1>
  </div>

  <iframe width="640" height="360" src="https://www.youtube.com/embed/Yka4SAfFCJg" title="KSI - Thick of it | Villager Cover" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
