<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center content */
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
        }
        button {
            padding: 10px; /* Inner padding */
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            cursor: pointer; /* Pointer cursor on hover */
            margin: 5px; /* Space between buttons */
        }
        button:hover {
            background-color: #555; /* Lighter grey on hover */
        }
    </style>
</head>
<body>

    <h1>Welcome to the Home Page</h1>
    <button onclick="goToGames()">Games</button>
    <button onclick="goToDataCenter()">Data Center</button>
    <button onclick="goToLogin()">Logout</button> <!-- Assuming you have a logout functionality -->

    <script>
        function goToGames() {
            window.location.href = 'games.html'; // Redirect to the games page
        }

        function goToDataCenter() {
            window.location.href = 'data_Center.html'; // Redirect to the data center page
        }

        function goToLogin() {
            window.location.href = 'login.html'; // Redirect to the login page
        }
    </script>

</body>
</html>
