<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center content */
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
        }
        button {
            padding: 10px; /* Inner padding */
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            cursor: pointer; /* Pointer cursor on hover */
            margin: 5px; /* Space between buttons */
        }
        button:hover {
            background-color: #555; /* Lighter grey on hover */
        }
        input[type="password"] {
            padding: 10px;
            margin: 10px;
            background-color: #333;
            color: #fff;
            border: 1px solid #fff;
            border-radius: 5px;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>

    <h1>Welcome to the Home Page</h1>
    <button onclick="goToGames()">Games</button>
    <button onclick="showPasswordInput()">Data Center</button>
    <input type="password" id="password" placeholder="Enter password">
    <button id="submitPasswordBtn" style="display: none;" onclick="checkPassword()">Submit</button>
    <button onclick="goToLogin()">Logout</button> <!-- Assuming you have a logout functionality -->

    <script>
        function goToGames() {
            window.location.href = 'games.html'; // Redirect to the games page
        }

        function goToLogin() {
            window.location.href = 'login.html'; // Redirect to the login page
        }

        function showPasswordInput() {
            document.getElementById('password').style.display = 'block'; // Show password input
            document.getElementById('submitPasswordBtn').style.display = 'block'; // Show submit button
        }

        function checkPassword() {
            const password = document.getElementById('password').value;

            if (password === 'tacocat') {
                // Redirect to the Data Center page if password is correct
                window.location.href = 'data-center.html';
            } else {
                alert('Incorrect password. Please try again.');
            }
        }
    </script>

</body>
</html>
