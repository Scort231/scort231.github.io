<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Scott's Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      animation: pulse 2s infinite;
      letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.7), 0 0 50px #0ff;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .glow {
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 20px 40px;
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.6), 0 0 50px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        opacity: 1;
      }
    }

  </style>
</head>
<body>
  <div class="glow">
    <h1>Welcome To Scott's Website</h1>
  </div>
</body>
</html>
