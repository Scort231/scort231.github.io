<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Scott's Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      padding: 50px 0 0 0; /* Added top padding for spacing */
    }

    h1 {
      font-size: 2rem; /* Slightly increased font size */
      animation: pulse 2s infinite;
      letter-spacing: 4px; /* Adjusted letter spacing */
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff; /* Adjusted shadow */
    }

    .glow {
      width: 85%; /* Slightly increased width */
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 0; /* Slightly increased padding */
      margin: 0 auto; /* Center the box */
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3); /* Adjusted shadow */
      animation: flicker 3s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes flicker {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        opacity: 1;
      }
    }

  </style>
</head>
<body>
  <div class="glow">
    <h1>Welcome To Scott's Website</h1>
  </div>
</body>
</html>
