<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            height: 100vh; /* Full viewport height */
            margin: 0;
            display: flex;
            justify-content: center; /* Horizontally center */
            align-items: center; /* Vertically center */
            flex-direction: column;
        }
        .buttons {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            align-items: center; /* Center buttons */
        }
        .buttons button {
            padding: 10px 20px;
            background-color: #333; /* Dark grey button background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin: 10px 0; /* Spacing between buttons */
            cursor: pointer;
            width: 150px; /* Set a fixed width for the buttons */
        }
        .buttons button:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
        .form-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button.submit-btn {
            padding: 10px;
            background-color: #333; /* Dark grey button background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin: 5px;
        }
        button.submit-btn:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
        #message, #signupMessage {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="buttons">
        <button onclick="showForm('loginForm')">Login</button>
        <button onclick="showForm('signupForm')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form-container">
        <h1>Login</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="submit-btn" onclick="login()">Login</button>
        <p id="message"></p>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="form-container">
        <h1>Sign Up</h1>
        <input type="text" id="newUsername" placeholder="New Username">
        <input type="password" id="newPassword" placeholder="New Password">
        <button class="submit-btn" onclick="signup()">Sign Up</button>
        <p id="signupMessage"></p>
    </div>

    <script>
        // Hide all forms initially
        function hideAllForms() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'none';
        }

        // Show the chosen form
        function showForm(formId) {
            hideAllForms(); // Hide all forms
            document.getElementById(formId).style.display = 'flex'; // Show the chosen form
        }

        // Initialize default account if none exists
        if (!localStorage.getItem('accounts')) {
            let defaultAccounts = [
                { username: 'Test', password: 'scortiscool' }
            ];
            localStorage.setItem('accounts', JSON.stringify(defaultAccounts));
        }

        // Login function
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const accounts = JSON.parse(localStorage.getItem('accounts'));

            const user = accounts.find(acc => acc.username === username && acc.password === password);
            
            if (user) {
                localStorage.setItem('isLoggedIn', 'true'); // Mark as logged in
                document.getElementById('message').style.color = "green";
                document.getElementById('message').textContent = "Login successful!";
                setTimeout(() => {  // Add a delay for a better user experience
                    window.location.href = "home.html"; // Redirect to home page
                }, 1000);  // 1-second delay before redirection
            } else {
                document.getElementById('message').style.color = "red";
                document.getElementById('message').textContent = "Invalid username or password!";
            }
        }

        // Signup function
        function signup() {
            const newUsername = document.getElementById('newUsername').value;
            const newPassword = document.getElementById('newPassword').value;

            if (newUsername && newPassword) {
                const accounts = JSON.parse(localStorage.getItem('accounts'));

                const userExists = accounts.some(acc => acc.username === newUsername);

                if (userExists) {
                    document.getElementById('signupMessage').style.color = "red";
                    document.getElementById('signupMessage').textContent = "Username already exists!";
                } else {
                    accounts.push({ username: newUsername, password: newPassword });
                    localStorage.setItem('accounts', JSON.stringify(accounts));
                    
                    document.getElementById('signupMessage').style.color = "green";
                    document.getElementById('signupMessage').textContent = "Account created successfully!";
                    
                    localStorage.setItem('isLoggedIn', 'true');
                    setTimeout(() => {  // Add a delay for a better user experience
                        window.location.href = "home.html"; // Redirect to home page
                    }, 1000);  // 1-second delay before redirection
                }
            } else {
                document.getElementById('signupMessage').style.color = "red";
                document.getElementById('signupMessage').textContent = "Please enter a valid username and password!";
            }
        }

        // Hide forms when page loads
        hideAllForms();
    </script>

</body>
</html>
