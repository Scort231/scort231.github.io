<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
            height: 100vh; /* Full viewport height */
            margin: 0;
            display: flex;
            justify-content: center; /* Horizontally center */
            align-items: center; /* Vertically center */
        }
        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #222; /* Slightly lighter background for contrast */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); /* Add some subtle shadow */
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            margin: 10px 0;
            width: 250px;
            background-color: #333; /* Dark grey background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
        }
        button {
            padding: 10px;
            background-color: #333; /* Dark grey button background */
            color: #fff; /* White text */
            border: 1px solid #fff; /* White border */
            border-radius: 5px;
            margin: 5px;
            width: 100%;
        }
        button:hover {
            background-color: #555; /* Slightly lighter grey on hover */
        }
    </style>
</head>
<body>

    <div class="login-form">
        <h1>Login</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if ((username === 'Scort_' && password === '28000394') || 
                (username === 'Ego2Bigg' && password === '28000570@ego!!')) {
                window.location.href = 'home.html';
            } else {
                alert('Incorrect username or password');
            }
        }
    </script>

</body>
</html>
