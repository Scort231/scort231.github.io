<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Scott's Website</title>
  <link rel="icon" href="favicon-16x16.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      padding: 50px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* Space out items vertically */
    }

    h1 {
      font-size: 2rem;
      animation: pulse 2s infinite;
      letter-spacing: 4px;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff;
    }

    .glow {
      width: 85%;
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 0;
      margin: 0 auto 20px auto;
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
    }

    .text-box {
      width: 70%;
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 8px;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.6), 0 0 25px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
      font-size: 1rem;
      color: white;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px #0ff;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .button {
      width: 120px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.6);
      color: white;
      text-align: center;
      font-size: 1rem;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px #0ff;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
      text-decoration: none; /* Remove underline from links */
    }

    .button:hover {
      transform: scale(1.1);
      background: rgba(0, 255, 255, 0.2);
    }

    .planet {
      margin-top: auto; /* Pushes the image to the bottom */
      width: 1200px; /* Increased width for a longer appearance */
      height: auto; /* Maintain aspect ratio */
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
      margin-bottom: 20px; /* Add bottom margin for spacing */
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes flicker {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        opacity: 1;
      }
    }

  </style>
</head>
<body>
  <div class="glow">
    <h1>Welcome To Scott's Website</h1>
  </div>

  <div class="text-box">
    Select the place you want to visit
  </div>

  <div class="button-container">
    <a class="button" href="games.html">Games</a>
    <a class="button" href="chat.html">Chat</a>
    <a class="button" href="data-center.html">Data Center</a>
  </div>

  <img class="planet" src="https://as2.ftcdn.net/v2/jpg/04/03/07/91/1000_F_403079179_T1cxoTKORZQsz2xb8ExJpsnP9nfex15G.jpg" alt="Galaxy Themed Portable Storage Box">

</body>
</html>
