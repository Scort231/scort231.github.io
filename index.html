<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Scott's Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a 40%, #000 100%);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      padding: 50px 0 0 0; /* Added top padding for spacing */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2rem; /* Slightly increased font size */
      animation: pulse 2s infinite;
      letter-spacing: 4px; /* Adjusted letter spacing */
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.7), 0 0 45px #0ff; /* Adjusted shadow */
    }

    .glow {
      width: 85%; /* Slightly increased width */
      text-align: center;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 15px 0; /* Slightly increased padding */
      margin: 0 auto 20px auto; /* Center the box, add margin below */
      border: 1px solid rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3); /* Adjusted shadow */
      animation: flicker 3s infinite;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px; /* Space between buttons */
      margin-top: 20px; /* Spacing from the title */
    }

    .button {
      width: 120px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.6);
      color: white;
      text-align: center;
      font-size: 1rem;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px #0ff;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.3);
      animation: flicker 3s infinite;
    }

    .button:hover {
      transform: scale(1.1);
      background: rgba(0, 255, 255, 0.2);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes flicker {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        opacity: 1;
      }
    }

  </style>
</head>
<body>
  <div class="glow">
    <h1>Welcome To Scott's Website</h1>
  </div>

  <div class="button-container">
    <div class="button">Games</div>
    <div class="button">Chat</div>
    <div class="button">Data Center</div>
  </div>

</body>
</html>
